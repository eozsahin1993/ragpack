services:
  backend:
    image: ghcr.io/eozsahin1993/ragpack:latest
    ports:
      - "9000:9000"
    env_file:
      - .env
    volumes:
      - ragpack_data:/data

  web-admin:
    image: ghcr.io/eozsahin1993/ragpack-web-admin:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # localhost only — access via: ssh -L 3000:localhost:3000 user@vps
    environment:
      - RAGPACK_BACKEND_URL=http://backend:9001
    depends_on:
      - backend

  ollama:
    image: ollama/ollama
    profiles: [ollama]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:?OLLAMA_EMBED_MODEL is not set}
      - OLLAMA_LLM_MODEL=${OLLAMA_LLM_MODEL:-}
    entrypoint: >
      sh -c "ollama serve &
      until ollama list > /dev/null 2>&1; do sleep 1; done &&
      echo \"[ollama] pulling embed model: $${OLLAMA_EMBED_MODEL}\" &&
      ollama pull $${OLLAMA_EMBED_MODEL} &&
      if [ -n \"$${OLLAMA_LLM_MODEL}\" ] && [ \"$${OLLAMA_LLM_MODEL}\" != \"$${OLLAMA_EMBED_MODEL}\" ]; then
        echo \"[ollama] pulling llm model: $${OLLAMA_LLM_MODEL}\" &&
        ollama pull $${OLLAMA_LLM_MODEL}
      fi &&
      wait"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

volumes:
  ragpack_data:
  ollama_data:
