services:
  backend:
    build:
      context: ./backend
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ragpack_data:/data
    depends_on:
      ollama:
        condition: service_healthy
        required: false

  ollama:
    image: ollama/ollama
    profiles: [ollama]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "4g"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  ragpack_data:
  ollama_data:
