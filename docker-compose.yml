services:
  backend:
    image: ghcr.io/eozsahin1993/ragpack:latest
    build:
      context: ./backend
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ragpack_data:/data

  web-admin:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install --prefer-offline && npm run dev"
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - RAGPACK_BACKEND_URL=http://backend:9000
    volumes:
      - ./web-admin:/app
      - web_admin_node_modules:/app/node_modules
    depends_on:
      - backend

  # TEI runs natively on Linux x86_64 (fast). On Mac (Apple Silicon) it runs under
  # Rosetta 2 emulation: ONNX warmup maxes out all CPU cores and can take 10+ minutes.
  # Not practical for local dev — use Ollama instead (--profile ollama).
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.7
    platform: linux/amd64
    profiles: [tei]
    ports:
      - "8080:80"
    volumes:
      - tei_data:/data
    environment:
      - TEI_EMBED_MODEL=${TEI_EMBED_MODEL:?TEI_EMBED_MODEL is not set - add it to your .env file}
    command: --model-id ${TEI_EMBED_MODEL:?TEI_EMBED_MODEL is not set - add it to your .env file} --max-client-batch-size 128
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: "4g"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 120s

  ollama:
    image: ollama/ollama
    profiles: [ollama]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:?OLLAMA_EMBED_MODEL is not set - add it to your .env file}
      - OLLAMA_LLM_MODEL=${OLLAMA_LLM_MODEL:-}
    entrypoint: >
      sh -c "ollama serve &
      until ollama list > /dev/null 2>&1; do sleep 1; done &&
      echo \"[ollama] pulling embed model: $${OLLAMA_EMBED_MODEL}\" &&
      ollama pull $${OLLAMA_EMBED_MODEL} &&
      if [ -n \"$${OLLAMA_LLM_MODEL}\" ] && [ \"$${OLLAMA_LLM_MODEL}\" != \"$${OLLAMA_EMBED_MODEL}\" ]; then
        echo \"[ollama] pulling llm model: $${OLLAMA_LLM_MODEL}\" &&
        ollama pull $${OLLAMA_LLM_MODEL}
      fi &&
      wait"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

volumes:
  ragpack_data:
  ollama_data:
  tei_data:
  web_admin_node_modules:
