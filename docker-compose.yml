services:
  backend:
    image: ghcr.io/eozsahin1993/ragpack:latest
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ragpack_data:/data

  ollama:
    image: ollama/ollama
    profiles: [ollama]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:?OLLAMA_EMBED_MODEL is not set - add it to your .env file}
    entrypoint: >
      sh -c "echo \"[ollama] pulling model: $${OLLAMA_EMBED_MODEL}\" &&
      ollama serve &
      until ollama list > /dev/null 2>&1; do sleep 1; done &&
      ollama pull $${OLLAMA_EMBED_MODEL} &&
      wait"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "4g"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

volumes:
  ragpack_data:
  ollama_data:
