services:
  backend:
    image: ghcr.io/eozsahin1993/ragpack:latest
    build:
      context: ./backend
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ragpack_data:/data

  web-admin:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - RAGPACK_BACKEND_URL=http://backend:9000
    volumes:
      - ./web-admin:/app
      - web_admin_node_modules:/app/node_modules
    depends_on:
      - backend

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    profiles: [tei]
    ports:
      - "8080:80"
    volumes:
      - tei_data:/data
    environment:
      - TEI_EMBED_MODEL=${TEI_EMBED_MODEL:?TEI_EMBED_MODEL is not set - add it to your .env file}
    command: --model-id ${TEI_EMBED_MODEL:?TEI_EMBED_MODEL is not set - add it to your .env file}
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: "4g"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 120s

  ollama:
    image: ollama/ollama
    profiles: [ollama]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:?OLLAMA_EMBED_MODEL is not set - add it to your .env file}
    entrypoint: >
      sh -c "echo \"[ollama] pulling model: $${OLLAMA_EMBED_MODEL}\" &&
      ollama serve &
      until ollama list > /dev/null 2>&1; do sleep 1; done &&
      ollama pull $${OLLAMA_EMBED_MODEL} &&
      wait"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "4g"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

volumes:
  ragpack_data:
  ollama_data:
  tei_data:
  web_admin_node_modules:
