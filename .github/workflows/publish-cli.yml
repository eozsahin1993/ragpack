name: Publish CLI

on:
  push:
    tags: ['cli/v*.*.*']

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Verify version matches tag
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#cli/}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: package.json=$PKG_VERSION tag=$TAG_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Debug OIDC exchange
        working-directory: ${{ github.workspace }}
        run: |
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm" | python3 -c "import sys,json; print(json.load(sys.stdin)['value'])")
          echo "OIDC token prefix: ${OIDC_TOKEN:0:30}..."
          RESPONSE=$(curl -sS -X POST https://registry.npmjs.org/-/npm/v1/login/oidc \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"oidc-token\",\"token\":\"$OIDC_TOKEN\"}")
          echo "npmjs.com OIDC response: $RESPONSE"

      - name: Publish
        run: npm publish --access public

      - name: Create GitHub Release
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "CLI ${GITHUB_REF_NAME#cli/}" \
            --generate-notes \
            --notes-start-tag "$(git tag --sort=-creatordate | grep '^cli/' | sed -n '2p')"
