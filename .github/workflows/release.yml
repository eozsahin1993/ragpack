name: Release

on:
  push:
    tags: ['v*.*.*']

jobs:
  backend:
    uses: ./.github/workflows/publish-backend.yml
    with:
      version-tag: ${{ github.ref_name }}
    permissions:
      contents: read
      packages: write

  web-admin:
    uses: ./.github/workflows/publish-web-admin.yml
    with:
      version-tag: ${{ github.ref_name }}
    permissions:
      contents: read
      packages: write

  publish-cli:
    name: Publish CLI to npm
    runs-on: ubuntu-latest
    needs: [backend, web-admin]
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Verify version matches tag
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "${{ github.ref_name }}" ]; then
            echo "Version mismatch: package.json=$PKG_VERSION tag=${{ github.ref_name }}"
            exit 1
          fi

      - run: npm ci
      - run: npm publish --access public

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-cli
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v[0-9]' | sed -n '2p')
          gh release create "${{ github.ref_name }}" \
            --title "RagPack ${{ github.ref_name }}" \
            --generate-notes \
            ${PREV_TAG:+--notes-start-tag "$PREV_TAG"}
